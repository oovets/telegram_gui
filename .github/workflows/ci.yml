name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # macOS-only: the app uses the native Keychain (keyring apple-native) and
    # the system WebView, so it neither builds nor runs on Linux/Windows.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # The `ui` crate embeds frontend/dist at compile time, so the frontend
      # must be built before any cargo step that touches it.
      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
